<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        width: 360px;
        margin: 0;
        padding: 14px;
        color: #1f2937;
        font-family: Arial, sans-serif;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      p {
        margin: 0 0 12px;
        color: #4b5563;
        font-size: 12px;
        line-height: 1.35;
      }

      .name-map {
        display: grid;
        gap: 8px;
        max-height: 320px;
        overflow: auto;
        padding-right: 2px;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr 28px;
        gap: 6px;
        align-items: center;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 7px;
        color: #111827;
        font: inherit;
        font-size: 12px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 8px 10px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
      }

      button.secondary {
        background: #e5e7eb;
        color: #111827;
      }

      button.danger {
        padding: 7px 0;
        background: #fee2e2;
        color: #991b1b;
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      .actions button {
        flex: 1;
      }

      .status {
        min-height: 16px;
        margin-top: 8px;
        color: #047857;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Name map</h1>
    <p>Replace campus names using your own pairs. Left side is what Campus shows, right side is what you want to see.</p>

    <div id="nameMap" class="name-map"></div>

    <div class="actions">
      <button id="addRow" class="secondary">Add row</button>
      <button id="reset" class="secondary">Reset</button>
      <button id="save">Save</button>
    </div>

    <div id="status" class="status" role="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
